yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json

site_name: Wikelo missions
site_url: https://lordjeffta.github.io/Wikelo-missions
repo_url: https://github.com/lordjeffta/Wikelo-missions
repo_name: lordjeffta/Wikelo-missions

theme:
  name: material
  features:
    - navigation.instant
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Clear mode

plugins:
  - search

markdown_extensions:
  - attr_list
